settings:
  language:
    name: Langue
    description: Sélectionnez la langue pour les références bibliques
  openAutomatically:
    name: Ouvrir les liens automatiquement
    description: Déplace la commande "Lier et ouvrir" en haut de la liste
  updatedLinkStructure:
    name: Conserver le texte du lien
    description: Lorsque activé, le texte actuel du lien sera conservé lors de la conversion du texte biblique
    keepCurrentStructure: Conserver la structure actuelle
    usePluginSettings: Utiliser les paramètres du plugin
  noLanguageParameter:
    name: Créer des liens indépendants de la langue
    description: Lorsque activé, aucun paramètre de langue n'est ajouté au lien. Les liens s'ouvriront dans la langue de JW Library
  reconvertExistingLinks:
    name: Reconvertir les liens existants
    description: Lorsque activé, les liens jwlibrary:// déjà convertis seront reconvertis selon les paramètres de formatage actuels. Cela vous permet de mettre à jour tous les liens pour correspondre à vos dernières préférences.
  bookLength:
    name: Longueur du texte du lien
    description: Choisissez la longueur du texte du lien
    short: Court
    medium: Moyen
    long: Long
  linkStyling:
    name: Style du lien
    description: Choisissez les caractères ou emoji à ajouter avant, après ou à l'intérieur du lien, choisissez le style de police
    reset: 'Réinitialiser par défaut : "{{default}}"'
    prefixOutsideLink:
      name: Préfixe en dehors du lien
      description: Texte à ajouter avant le lien
    prefixInsideLink:
      name: Préfixe à l'intérieur du lien
      description: Texte à ajouter au début du texte du lien
    suffixInsideLink:
      name: Suffixe à l'intérieur du lien
      description: Texte à ajouter à la fin du texte du lien
    suffixOutsideLink:
      name: Suffixe en dehors du lien
      description: Texte à ajouter après le lien
    presets:
      name: Préréglages de style
      description: Choisissez un style prédéfini pour le lien
    fontStyle:
      name: Style de police
      description: Choisissez le style de police pour le texte du lien
      normal: Normal
      italic: Italique
      bold: Gras
    preview:
      name: Aperçu du lien
  bibleQuote:
    name: Formatage des citations bibliques
    description: Configurez la façon dont les citations bibliques sont formatées lors de l'insertion
    presets:
      name: Préréglages de modèle
      short: Lien + citation
      plain: Lien dans citation
      foldable: Callout pliable
      expanded: Callout déplié
    template:
      name: Modèle de citation
      description: 'Personnalisez le format de citation avec les variables : {bibleRef}, {bibleRefLinked}, {quote}'
    preview:
      name: Aperçu de la citation biblique
  offlineBible:
    name: Offline Bible
    description: Import a Bible EPUB once and use local chapter data for offline citation lookup.
    enabled:
      name: Enable offline Bible
      description: Allow the citation pipeline to use imported local Bible data.
    preferOffline:
      name: Prefer offline quotes
      description: Check the imported offline Bible before attempting online retrieval.
    allowOnlineFallback:
      name: Allow online fallback
      description: If offline data is missing, allow the plugin to try the online citation provider.
    installedList:
      name: Bibles hors ligne installées
      description: Une Bible hors ligne peut être installée par langue. La langue est détectée à partir des métadonnées EPUB.
      empty: Aucune Bible hors ligne n'est encore installée.
      entry: '{{sourceFileName}} — {{chapterCount}} chapitres, importée le {{importedAt}}'
    actions:
      name: Actions de la Bible hors ligne
      description: Importez un EPUB pour ajouter une nouvelle langue. Pour remplacer une langue existante, supprimez-la d'abord.
      import: Importer l'EPUB de la Bible
      remove: Supprimer
      openFolder: Ouvrir le dossier de la Bible hors ligne
commands:
  linkUnlinkedBibleReferences: Lier les références bibliques non liées
  convertToJWLibraryLinks: Convertir les liens dans la sélection en liens JW Library
  insertBibleQuotes: Insérer des citations bibliques pour les liens JW Library
  insertBibleQuoteAtCursor: Insérer une citation biblique au curseur
convertSuggester:
  emptyStateText: Sélectionnez un type de conversion
  options:
    all: Tout
    bible: Références bibliques
    publication: Publications
contextMenu:
  insertBibleQuote: Insérer une citation biblique
notices:
  convertedBibleReferences: '{{count}} références bibliques converties'
  pleaseSelectText: Veuillez sélectionner le texte à convertir
  noBibleReferencesFound: Aucune référence biblique trouvée
  bibleQuotesInserted: Citations bibliques insérées avec succès
  bibleQuotesInsertedSelection: Citations bibliques insérées pour la sélection
  bibleQuoteInsertedAtCursor: Citation biblique insérée au curseur
  noBibleLinksFound: Aucun lien JW Library trouvé
  noBibleLinkAtCursor: Aucun lien JW Library trouvé au curseur
  bibleQuoteAlreadyExists: La citation biblique existe déjà
  errorInsertingQuotes: Erreur lors de l'insertion des citations bibliques
  bibleQuoteFetchFailed: Impossible de récupérer le texte biblique — veuillez réessayer
  offlineBibleImported: Bible hors ligne importée pour {{language}}
  offlineBibleRemoved: Bible hors ligne supprimée pour {{language}}
  offlineBibleAlreadyInstalled: Une Bible hors ligne pour {{language}} est déjà installée. Supprimez-la d'abord pour la réimporter.
  offlineBibleImportFailed: Échec de l'importation de l'EPUB de la Bible hors ligne
  offlineBibleOpenFolderFailed: Impossible d'ouvrir le dossier de la Bible hors ligne
suggestions:
  createLink: 'Créer un lien : {{text}}'
  createLinks: 'Créer des liens : {{text}}'
  createAndOpen: 'Créer un lien et ouvrir : {{text}}'
  createMultipleAndOpenFirst: 'Créer des liens et ouvrir le premier : {{text}}'
  typing: 'Entrez une référence biblique : {{text}}'
  typingEmpty: Entrez une référence biblique
errors:
  invalidVerseNumber: Numéro de verset invalide
  versesAscendingOrder: Les versets doivent être dans l'ordre croissant
  chaptersAscendingOrder: Les chapitres doivent être dans l'ordre croissant
  invalidVerseFormat: Format de verset invalide
  invalidReferenceFormat: Format de référence invalide
  unsupportedLanguage: Langue non prise en charge
  offlineBibleNotInstalled: Aucune Bible hors ligne n'est installée pour {{language}}. Importez un EPUB de la Bible dans les paramètres pour activer les citations hors ligne.
  offlineBibleVerseMissing: Les versets demandés sont manquants ou illisibles dans la Bible hors ligne pour {{language}}.
  offlineBibleLookupFailed: La recherche dans la Bible hors ligne a échoué.
  onlineFallbackDisabled: Le recours en ligne est désactivé.
