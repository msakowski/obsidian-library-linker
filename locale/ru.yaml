settings:
  language:
    name: Язык
    description: Выберите язык для библейских ссылок
  openAutomatically:
    name: Открывать ссылки автоматически
    description: Перемещает команду «Создать ссылку и открыть» в начало списка
  updatedLinkStructure:
    name: Сохранять текст ссылки
    description: Если включено, текущий текст ссылки сохраняется при конвертации библейского текста
    keepCurrentStructure: Сохранить текущую структуру
    usePluginSettings: Использовать настройки плагина
  noLanguageParameter:
    name: Создавать ссылки независимо от языка
    description: Если включено, параметр языка не добавляется к ссылке. Ссылки будут открываться на языке JW Library
  reconvertExistingLinks:
    name: Переконвертировать существующие ссылки
    description: Если включено, уже сконвертированные ссылки jwlibrary:// будут переконвертированы согласно текущим настройкам форматирования. Это позволяет обновить все ссылки в соответствии с последними предпочтениями.
  bookLength:
    name: Длина текста ссылки
    description: Выберите длину текста ссылки
    short: Короткий
    medium: Средний
    long: Длинный
  linkStyling:
    name: Стиль ссылки
    description: Выберите символы или эмодзи для добавления до, после или внутри ссылки, выберите стиль шрифта
    reset: 'Сбросить по умолчанию: "{{default}}"'
    prefixOutsideLink:
      name: Префикс снаружи ссылки
      description: Текст, добавляемый перед ссылкой
    prefixInsideLink:
      name: Префикс внутри ссылки
      description: Текст, добавляемый в начало текста ссылки
    suffixInsideLink:
      name: Суффикс внутри ссылки
      description: Текст, добавляемый в конец текста ссылки
    suffixOutsideLink:
      name: Суффикс снаружи ссылки
      description: Текст, добавляемый после ссылки
    presets:
      name: Предустановки стиля
      description: Выберите готовый стиль для ссылки
    fontStyle:
      name: Стиль шрифта
      description: Выберите стиль шрифта для текста ссылки
      normal: Обычный
      italic: Курсив
      bold: Жирный
    preview:
      name: Предварительный просмотр ссылки
  bibleQuote:
    name: Форматирование библейской цитаты
    description: Настройте формат библейских цитат при вставке
    presets:
      name: Шаблоны
      short: Ссылка + цитата
      plain: Ссылка в цитате
      foldable: Сворачиваемый блок
      expanded: Развёрнутый блок
    template:
      name: Шаблон цитаты
      description: 'Настройте формат цитаты с помощью переменных: {bibleRef}, {bibleRefLinked}, {quote}'
    preview:
      name: Предварительный просмотр цитаты
  offlineBible:
    name: Офлайн-Библия
    description: Импортируйте EPUB Библии один раз и используйте локальные данные глав для офлайн-поиска цитат.
    enabled:
      name: Включить офлайн-Библию
      description: Разрешить конвейеру цитат использовать импортированные локальные данные Библии.
    preferOffline:
      name: Предпочитать офлайн-цитаты
      description: Сначала проверять импортированную офлайн-Библию перед попыткой онлайн-поиска.
    allowOnlineFallback:
      name: Разрешить онлайн-резерв
      description: Если офлайн-данные отсутствуют, разрешить плагину попытаться использовать онлайн-провайдер цитат.
    installedList:
      name: Установленные офлайн-Библии
      description: Для каждого языка можно установить одну офлайн-Библию. Язык определяется по метаданным EPUB.
      empty: Офлайн-Библии ещё не установлены.
      entry: '{{sourceFileName}} — {{chapterCount}} глав, импортировано {{importedAt}}'
    actions:
      name: Действия с офлайн-Библией
      description: Импортируйте EPUB, чтобы добавить новый язык. Чтобы заменить существующую, сначала удалите её.
      import: Импортировать EPUB Библии
      importing: Импорт...
      openFolder: Открыть папку офлайн-Библии
