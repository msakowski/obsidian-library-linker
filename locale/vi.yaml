settings:
  language:
    name: Ngôn ngữ
    description: Chọn ngôn ngữ cho các tham chiếu Kinh Thánh
  openAutomatically:
    name: Tự động mở liên kết
    description: Di chuyển lệnh "Tạo liên kết và mở" lên đầu danh sách
  updatedLinkStructure:
    name: Giữ nguyên văn bản liên kết
    description: Khi bật, văn bản liên kết hiện tại sẽ được giữ nguyên khi chuyển đổi văn bản Kinh Thánh
    keepCurrentStructure: Giữ cấu trúc hiện tại
    usePluginSettings: Sử dụng cài đặt của plugin
  noLanguageParameter:
    name: Tạo liên kết không phụ thuộc ngôn ngữ
    description: Khi bật, tham số ngôn ngữ sẽ không được thêm vào liên kết. Liên kết sẽ mở theo ngôn ngữ của JW Library
  reconvertExistingLinks:
    name: Chuyển đổi lại các liên kết hiện có
    description: Khi bật, các liên kết jwlibrary:// đã được chuyển đổi trước đó sẽ được chuyển đổi lại theo cài đặt định dạng hiện tại. Điều này cho phép bạn cập nhật tất cả liên kết để phù hợp với tùy chọn mới nhất của mình.
  bookLength:
    name: Độ dài văn bản liên kết
    description: Chọn độ dài của văn bản liên kết
    short: Ngắn
    medium: Trung bình
    long: Dài
  linkStyling:
    name: Kiểu định dạng liên kết
    description: Chọn ký tự hoặc emoji để thêm trước, sau hoặc bên trong liên kết, Chọn kiểu phông chữ
    reset: 'Đặt lại về mặc định: "{{default}}"'
    prefixOutsideLink:
      name: Tiền tố bên ngoài liên kết
      description: Văn bản thêm trước liên kết
    prefixInsideLink:
      name: Tiền tố bên trong liên kết
      description: Văn bản thêm ở đầu văn bản liên kết
    suffixInsideLink:
      name: Hậu tố bên trong liên kết
      description: Văn bản thêm ở cuối văn bản liên kết
    suffixOutsideLink:
      name: Hậu tố bên ngoài liên kết
      description: Văn bản thêm sau liên kết
    presets:
      name: Mẫu kiểu định dạng
      description: Chọn một kiểu định dạng sẵn cho liên kết
    fontStyle:
      name: Kiểu chữ
      description: Chọn kiểu chữ cho văn bản liên kết
      normal: Bình thường
      italic: Nghiêng
      bold: Đậm
    preview:
      name: Xem trước liên kết
  bibleQuote:
    name: Định dạng trích dẫn Kinh Thánh
    description: Cấu hình cách trích dẫn Kinh Thánh được định dạng khi chèn vào
    presets:
      name: Mẫu định dạng
      short: Liên kết + câu trích
      plain: Liên kết trong trích dẫn
      foldable: Callout có thể thu gọn
      expanded: Callout mở rộng
    template:
      name: Mẫu trích dẫn
      description: 'Tùy chỉnh định dạng trích dẫn bằng các biến: {bibleRef}, {bibleRefLinked}, {quote}'
    preview:
      name: Xem trước trích dẫn Kinh Thánh
  offlineBible:
    name: Offline Bible
    description: Import a Bible EPUB once and use local chapter data for offline citation lookup.
    enabled:
      name: Enable offline Bible
      description: Allow the citation pipeline to use imported local Bible data.
    preferOffline:
      name: Prefer offline quotes
      description: Check the imported offline Bible before attempting online retrieval.
    allowOnlineFallback:
      name: Allow online fallback
      description: If offline data is missing, allow the plugin to try the online citation provider.
    installedList:
      name: Kinh Thánh ngoại tuyến đã cài đặt
      description: Mỗi ngôn ngữ có thể cài đặt một bản Kinh Thánh ngoại tuyến. Ngôn ngữ được phát hiện từ siêu dữ liệu EPUB.
      empty: Chưa có bản Kinh Thánh ngoại tuyến nào được cài đặt.
      entry: '{{sourceFileName}} — {{chapterCount}} chương, đã nhập vào {{importedAt}}'
    actions:
      name: Hành động Kinh Thánh ngoại tuyến
      description: Nhập một tệp EPUB để thêm một ngôn ngữ mới. Để thay thế bản hiện có, hãy xóa bản đó trước.
      import: Nhập tệp EPUB Kinh Thánh
      remove: Xóa
      openFolder: Mở thư mục Kinh Thánh ngoại tuyến
