    reset: 'Vrati na zadano: "{{default}}"'
    prefixOutsideLink:
      name: Prefiks izvan linka
      description: Tekst koji se dodaje prije linka
    prefixInsideLink:
      name: Prefiks unutar linka
      description: Tekst koji se dodaje na početak teksta linka
    suffixInsideLink:
      name: Sufiks unutar linka
      description: Tekst koji se dodaje na kraj teksta linka
    suffixOutsideLink:
      name: Sufiks izvan linka
      description: Tekst koji se dodaje nakon linka
    presets:
      name: Stilske predloške
      description: Odaberite stilsku predložak za link
    fontStyle:
      name: Stil fonta
      description: Odaberite stil fonta za tekst linka
      normal: Normalno
      italic: Kurziv
      bold: Podebljano
    preview:
      name: Pregled linka
  bibleQuote:
    name: Oblikovanje biblijskog citata
    description: Konfigurirajte oblikovanje biblijskih citata prilikom umetanja
    presets:
      name: Predlošci predložaka
      short: Link + citat
      plain: Link u citatu
      foldable: Sklopivi okvir
      expanded: Prošireni okvir
    template:
      name: Predložak citata
      description: 'Prilagodite format citata pomoću varijabli: {bibleRef}, {bibleRefLinked}, {quote}'
    preview:
      name: Pregled biblijskog citata
  offlineBible:
    name: Offline Bible
    description: Import a Bible EPUB once and use local chapter data for offline citation lookup.
    enabled:
      name: Enable offline Bible
      description: Allow the citation pipeline to use imported local Bible data.
    preferOffline:
      name: Prefer offline quotes
      description: Check the imported offline Bible before attempting online retrieval.
    allowOnlineFallback:
      name: Allow online fallback
      description: If offline data is missing, allow the plugin to try the online citation provider.
    installedList:
      name: Instalirane izvanmrežne Biblije
      description: Po jeziku se može instalirati jedna izvanmrežna Biblija. Jezik se otkriva iz EPUB metapodataka.
      empty: Još nije instalirana nijedna izvanmrežna Biblija.
      entry: '{{sourceFileName}} — {{chapterCount}} poglavlja, uvezeno {{importedAt}}'
    actions:
      name: Radnje izvanmrežne Biblije
      description: Uvezite EPUB kako biste dodali novi jezik. Za zamjenu postojećeg, prvo ga uklonite.
      import: Uvezi EPUB Biblije
      remove: Ukloni
      openFolder: Otvori mapu izvanmrežne Biblije
