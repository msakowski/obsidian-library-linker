    name: Ponovno pretvori postojeće linkove
    description: Kada je omogućeno, već pretvoreni jwlibrary:// linkovi bit će ponovno pretvoreni prema trenutnim postavkama oblikovanja. To vam omogućuje ažuriranje svih linkova prema najnovijim postavkama.
