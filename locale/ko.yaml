settings:
  language:
    name: 언어
    description: 성경 참조를 위한 언어를 선택합니다
  openAutomatically:
    name: 링크 자동 열기
    description: '"링크하고 열기" 명령을 목록의 맨 위로 이동합니다'
  updatedLinkStructure:
    name: 링크 텍스트 유지
    description: 활성화하면 성경 텍스트를 변환할 때 현재 링크 텍스트가 유지됩니다
    keepCurrentStructure: 현재 구조 유지
    usePluginSettings: 플러그인 설정 사용
  noLanguageParameter:
    name: 링크를 언어 독립적으로 생성
    description: 활성화하면 링크에 언어 매개변수가 추가되지 않습니다. 링크는 JW Library의 언어로 열립니다
  reconvertExistingLinks:
    name: 기존 링크 재변환
    description: 활성화하면 이미 변환된 jwlibrary:// 링크가 현재 형식 설정에 따라 재변환됩니다. 이를 통해 모든 링크를 최신 설정에 맞게 업데이트할 수 있습니다.
  bookLength:
    name: 링크 텍스트 길이
    description: 링크 텍스트의 길이를 선택합니다
    short: 짧게
    medium: 중간
    long: 길게
  linkStyling:
    name: 링크 스타일
    description: 링크 앞, 뒤 또는 내부에 추가할 문자 또는 이모지, 글꼴 스타일을 선택합니다
    reset: '기본값으로 재설정: "{{default}}"'
    prefixOutsideLink:
      name: 링크 외부 접두사
      description: 링크 앞에 추가할 텍스트
    prefixInsideLink:
      name: 링크 내부 접두사
      description: 링크 텍스트 시작 부분에 추가할 텍스트
    suffixInsideLink:
      name: 링크 내부 접미사
      description: 링크 텍스트 끝 부분에 추가할 텍스트
    suffixOutsideLink:
      name: 링크 외부 접미사
      description: 링크 뒤에 추가할 텍스트
    presets:
      name: 스타일 프리셋
      description: 링크에 대한 사전 설정 스타일을 선택합니다
    fontStyle:
      name: 글꼴 스타일
      description: 링크 텍스트의 글꼴 스타일을 선택합니다
      normal: 보통
      italic: 이탤릭체
      bold: 굵게
    preview:
      name: 링크 미리보기
  bibleQuote:
    name: 성경 인용문 형식
    description: 성경 인용문이 삽입될 때의 형식을 구성합니다
    presets:
      name: 템플릿 프리셋
      short: 링크 + 인용문
      plain: 인용문 안의 링크
      foldable: 접을 수 있는 콜아웃
      expanded: 펼쳐진 콜아웃
    template:
      name: 인용문 템플릿
      description: '변수를 사용하여 인용문 형식을 사용자 정의하세요: {bibleRef}, {bibleRefLinked}, {quote}'
    preview:
      name: 성경 인용문 미리보기
  offlineBible:
    name: Offline Bible
    description: Import a Bible EPUB once and use local chapter data for offline citation lookup.
    enabled:
      name: Enable offline Bible
      description: Allow the citation pipeline to use imported local Bible data.
    preferOffline:
      name: Prefer offline quotes
      description: Check the imported offline Bible before attempting online retrieval.
    allowOnlineFallback:
      name: Allow online fallback
      description: If offline data is missing, allow the plugin to try the online citation provider.
    status:
      name: Installed language status
      notInstalled: No offline Bible is installed for {{language}}.
      installed: Offline Bible for {{language}} installed from {{sourceFileName}} on {{importedAt}} with {{chapterCount}} chapters.
    actions:
      name: Offline Bible actions
      description: Import, replace, remove, or inspect the offline Bible corpus for the selected language.
      import: Import Bible EPUB
      reimport: Re-import Bible EPUB
      remove: Remove Offline Bible
      openFolder: Open Offline Bible Folder
