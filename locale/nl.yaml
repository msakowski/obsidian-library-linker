settings:
  language:
    name: Taal
    description: Kies de taal voor de bijbelverwijzingen
  openAutomatically:
    name: Links automatisch openen
    description: Verplaatst het commando "Link en openen" naar de bovenkant van de lijst
  updatedLinkStructure:
    name: Linktekst behouden
    description: Indien ingeschakeld, wordt de huidige linktekst behouden bij het converteren van bijbelteksten
    keepCurrentStructure: Huidige linktekst behouden
    usePluginSettings: Plugin-instellingen gebruiken
  noLanguageParameter:
    name: Links taalonafhankelijk maken
    description: Indien ingeschakeld, worden geen taalparameters toegevoegd aan het einde van een link. Links worden geopend in de taal van de JW Library
  reconvertExistingLinks:
    name: Bestaande links opnieuw converteren
    description: Indien ingeschakeld, worden reeds geconverteerde jwlibrary:// links opnieuw geconverteerd volgens de huidige opmaak-instellingen. Dit maakt het mogelijk om alle links bij te werken naar je nieuwste voorkeuren.
  bookLength:
    name: Linktekst-lengte
    description: Kies de lengte van de linktekst
    short: Kort
    medium: Middel
    long: Lang
  linkStyling:
    name: Link-styling
    description: Kies tekens of emoji's die na of binnen de link worden ingevoegd; kies tekst stijl
    reset: 'Terugzetten naar standaard: "{{default}}"'
    prefixOutsideLink:
      name: Voorvoegsel buiten de link
      description: Tekst die voor de link wordt toegevoegd
    prefixInsideLink:
      name: Voorvoegsel binnen de link
      description: Tekst die aan het begin van de linktekst wordt toegevoegd
    suffixInsideLink:
      name: Achtervoegsel binnen de link
      description: Tekst die aan het einde van de linktekst wordt toegevoegd
    suffixOutsideLink:
      name: Achtervoegsel buiten de link
      description: Tekst die na de link wordt toegevoegd
    presets:
      name: Stijlsjablonen
      description: Kies een stijlsjabloon voor de link
    fontStyle:
      name: Tekst stijl
      description: Kies de tekststijl voor de linktekst
      normal: Normaal
      italic: Cursief
      bold: Vet
    preview:
      name: Linkvoorbeeld
  bibleQuote:
    name: Bijbelcitaat Formattering
    description: Configureer hoe bijbelcitaten worden geformatteerd wanneer ze worden ingevoegd
    presets:
      name: Sjabloonvoorinstellingen
      short: Link + citaat
      plain: Link in citaat
      foldable: Inklapbare callout
      expanded: Uitgeklapte callout
    template:
      name: Citaatsjabloon
      description: 'Pas het citaatformaat aan met variabelen: {bibleRef}, {bibleRefLinked}, {quote}'
    preview:
      name: Bijbelcitaat Voorbeeld
  offlineBible:
    name: Offline Bible
    description: Import a Bible EPUB once and use local chapter data for offline citation lookup.
    enabled:
      name: Enable offline Bible
      description: Allow the citation pipeline to use imported local Bible data.
    preferOffline:
      name: Prefer offline quotes
      description: Check the imported offline Bible before attempting online retrieval.
    allowOnlineFallback:
      name: Allow online fallback
      description: If offline data is missing, allow the plugin to try the online citation provider.
    installedList:
      name: Geïnstalleerde offline Bijbels
      description: Per taal kan één offline Bijbel worden geïnstalleerd. De taal wordt gedetecteerd uit de EPUB-metadata.
      empty: Er zijn nog geen offline Bijbels geïnstalleerd.
      entry: '{{sourceFileName}} — {{chapterCount}} hoofdstukken, geïmporteerd op {{importedAt}}'
    actions:
      name: Acties offline Bijbel
      description: Importeer een EPUB om een nieuwe taal toe te voegen. Verwijder een bestaande eerst om deze te vervangen.
      import: Bijbel-EPUB importeren
      remove: Verwijderen
      openFolder: Map offline Bijbel openen
