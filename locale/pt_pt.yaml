settings:
  language:
    name: Idioma
    description: Selecione o idioma para as referências da Bíblia
  openAutomatically:
    name: Abrir automaticamente hiperligações da JW Library
    description: Move o comando "Criar hiperligação e abrir" para o topo da lista
  updatedLinkStructure:
    name: Manter o texto da hiperligação
    description: Quando ativo, o texto atual será mantido ao converter textos bíblicos
    keepCurrentStructure: Manter estrutura atual
    usePluginSettings: Usar configurações do plugin
  noLanguageParameter:
    name: Criar hiperligações independente de idioma
    description: Ao ativar, as hiperligações da JW Library serão criados sem o parâmetro de idioma. As hiperligações serão abertas no idioma do aplicativo JW Library.
  reconvertExistingLinks:
    name: Reconverter hiperligações existentes
    description: Quando ativado, as hiperligações jwlibrary:// já convertidas serão reconvertidas de acordo com as configurações de formatação atuais. Isso permite atualizar todas as hiperligações para corresponder às suas preferências mais recentes.
  bookLength:
    name: Comprimento do texto da hiperligação do livro bíblico
    description: Escolha o comprimento do texto do livro bíblico na hiperligação
    short: Curto
    medium: Médio
    long: Longo
  linkStyling:
    name: Estilos de hiperligação
    description: Escolha caracteres ou emojis para adicionar antes, depois ou no interior da hiperligação, Escolha o estilo da fonte
    reset: 'Regressar às configurações originais: "{{default}}"'
    prefixOutsideLink:
      name: Prefixo fora da hiperligação
      description: Texto a adicionar antes da hiperligação
    prefixInsideLink:
      name: Prefixo dentro da hiperligação
      description: ' Texto a adicionar no início do texto da hiperligação'
    suffixInsideLink:
      name: Sufixo dentro da hiperligação
      description: Texto a adicionar no final do texto da hiperligação
    suffixOutsideLink:
      name: Sufixo fora da hiperligação
      description: Texto a adicionar após a hiperligação
    presets:
      name: Estilos predefinidos
      description: Escolha um estilo predefinido para as hiperligações
    fontStyle:
      name: Font style
      description: Escolha o estilo da fonte para o texto da hiperligação
      normal: Normal
      italic: Italico
      bold: Negrito
    preview:
      name: Pré-visualização do estilo da hiperligação
  bibleQuote:
    name: Foramato da citação bíblica
    description: Configure o formato das citações bíblicas inseridas
    presets:
      name: Predefinições de modelo
      short: Link + citação
      plain: Link na citação
      foldable: Destaque recolhível
      expanded: Destaque expandido
    template:
      name: Modelo de citação
      description: 'Personalize o formato da citação usando variáveis: {bibleRef}, {bibleRefLinked}, {quote}'
    preview:
      name: Pré-visualização da citação bíblica
  offlineBible:
    name: Offline Bible
    description: Import a Bible EPUB once and use local chapter data for offline citation lookup.
    enabled:
      name: Enable offline Bible
      description: Allow the citation pipeline to use imported local Bible data.
    preferOffline:
      name: Prefer offline quotes
      description: Check the imported offline Bible before attempting online retrieval.
    allowOnlineFallback:
      name: Allow online fallback
      description: If offline data is missing, allow the plugin to try the online citation provider.
    status:
      name: Installed language status
      notInstalled: No offline Bible is installed for {{language}}.
      installed: Offline Bible for {{language}} installed from {{sourceFileName}} on {{importedAt}} with {{chapterCount}} chapters.
    actions:
      name: Offline Bible actions
      description: Import, replace, remove, or inspect the offline Bible corpus for the selected language.
      import: Import Bible EPUB
      reimport: Re-import Bible EPUB
      remove: Remove Offline Bible
      openFolder: Open Offline Bible Folder
