settings:
  language:
    name: Language
    description: Select the language for Bible references
  openAutomatically:
    name: Open links automatically
    description: Moves the "Link and open" command to the top of the list
  updatedLinkStructure:
    name: Keep link text
    description: When enabled, the current link text will be kept when converting Bible text
    keepCurrentStructure: Keep current structure
    usePluginSettings: Use plugin settings
  noLanguageParameter:
    name: Create links language independent
    description: When enabled, no language parameter is added to the link. Links will open in the language of the JW Library
  reconvertExistingLinks:
    name: Reconvert existing links
    description: When enabled, already-converted jwlibrary:// links will be reconverted according to current formatting settings. This allows you to update all links to match your latest preferences.
  bookLength:
    name: Link text length
    description: Choose the length of the link text
    short: Short
    medium: Medium
    long: Long
  linkStyling:
    name: Link styling
    description: Choose characters or emoji to add before, after or inside the link, Choose font style
    reset: 'Reset to default: "{{default}}"'
    prefixOutsideLink:
      name: Prefix outside link
      description: Text to add before the link
    prefixInsideLink:
      name: Prefix inside link
      description: Text to add at the beginning of the link text
    suffixInsideLink:
      name: Suffix inside link
      description: Text to add at the end of the link text
    suffixOutsideLink:
      name: Suffix outside link
      description: Text to add after the link
    presets:
      name: Style presets
      description: Choose a preset style for the link
    fontStyle:
      name: Font style
      description: Choose the font style for the link text
      normal: Normal
      italic: Italic
      bold: Bold
    preview:
      name: Link preview
  bibleQuote:
    name: Bible quote formatting
    description: Configure how Bible quotes are formatted when inserted
    presets:
      name: Template presets
      short: Link + quote
      plain: Link in quote
      foldable: Foldable Callout
      expanded: Expanded Callout
    template:
      name: Quote template
      description: 'Customize the quote format using variables: {bibleRef}, {bibleRefLinked}, {quote}'
    preview:
      name: Bible quote preview
  offlineBible:
    name: Offline Bible
    description: Import a Bible EPUB once and use local chapter data for offline citation lookup.
    enabled:
      name: Enable offline Bible
      description: Allow the citation pipeline to use imported local Bible data.
    preferOffline:
      name: Prefer offline quotes
      description: Check the imported offline Bible before attempting online retrieval.
    allowOnlineFallback:
      name: Allow online fallback
      description: If offline data is missing, allow the plugin to try the online citation provider.
    status:
      name: Installed language status
      notInstalled: No offline Bible is installed for {{language}}.
      installed: Offline Bible for {{language}} installed from {{sourceFileName}} on {{importedAt}} with {{chapterCount}} chapters.
    actions:
      name: Offline Bible actions
      description: Import, replace, remove, or inspect the offline Bible corpus for the selected language.
      import: Import Bible EPUB
      reimport: Re-import Bible EPUB
      remove: Remove Offline Bible
      openFolder: Open Offline Bible Folder
commands:
  linkUnlinkedBibleReferences: Link unlinked Bible references
  convertToJWLibraryLinks: Convert links in selection to JW Library links
  insertBibleQuotes: Insert Bible quotes for JW Library links
  insertBibleQuoteAtCursor: Insert Bible quote at cursor
convertSuggester:
  emptyStateText: Select a conversion type
  options:
    all: All
    bible: Bible references
    publication: Publications
contextMenu:
  insertBibleQuote: Insert Bible quote
notices:
  convertedBibleReferences: Converted {{count}} Bible references
  pleaseSelectText: Please select text to convert
  noBibleReferencesFound: No Bible references found
  bibleQuotesInserted: Bible quotes inserted successfully
  bibleQuotesInsertedSelection: Bible quotes inserted for selection
  bibleQuoteInsertedAtCursor: Bible quote inserted at cursor
  noBibleLinksFound: No JW Library links found
  noBibleLinkAtCursor: No JW Library link found at cursor
  bibleQuoteAlreadyExists: Bible quote already exists
  errorInsertingQuotes: Error inserting Bible quotes
  offlineBibleImported: Offline Bible imported for {{language}}
  offlineBibleReimported: Offline Bible re-imported for {{language}}
  offlineBibleRemoved: Offline Bible removed for {{language}}
  offlineBibleImportFailed: Failed to import the offline Bible EPUB
  offlineBibleOpenFolderFailed: Could not open the offline Bible folder
suggestions:
  createLink: 'Create link: {{text}}'
  createLinks: 'Create links: {{text}}'
  createAndOpen: 'Create link and open: {{text}}'
  createMultipleAndOpenFirst: 'Create links and open first: {{text}}'
  typing: 'Enter Bible reference: {{text}}'
  typingEmpty: Enter Bible reference
errors:
  invalidVerseNumber: Invalid verse number
  versesAscendingOrder: Verses must be in ascending order
  chaptersAscendingOrder: Chapters must be in ascending order
  invalidVerseFormat: Invalid verse format
  invalidReferenceFormat: Invalid reference format
  unsupportedLanguage: Unsupported language
