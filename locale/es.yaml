settings:
  language:
    name: Idioma
    description: Selecciona el idioma para las referencias bíblicas
  openAutomatically:
    name: Abrir enlaces automáticamente
    description: Mueve el comando "Enlazar y abrir" al principio de la lista
  updatedLinkStructure:
    name: Conservar texto del enlace
    description: Si está activado, se conservará el texto actual del enlace al convertir textos bíblicos
    keepCurrentStructure: Conservar estructura actual
    usePluginSettings: Usar configuración del complemento
  noLanguageParameter:
    name: Crear enlaces sin idioma específico
    description: Si está activado, no se añadirá ningún parámetro de idioma al enlace. Los enlaces se abrirán en el idioma correspondiente de JW Library
  reconvertExistingLinks:
    name: Reconvertir enlaces existentes
    description: Si está activado, los enlaces jwlibrary:// ya convertidos se reconvertirán según la configuración de formato actual. Esto permite actualizar todos los enlaces para que coincidan con tus preferencias más recientes.
  bookLength:
    name: Longitud del texto del enlace
    description: Elige la longitud del texto del enlace
    short: Corta
    medium: Media
    long: Larga
  linkStyling:
    name: Estilo del enlace
    description: Elige caracteres o emojis que se añadan antes, después o dentro del enlace; elige el estilo de fuente
    reset: 'Restablecer a predeterminado: "{{default}}"'
    prefixOutsideLink:
      name: Prefijo fuera del enlace
      description: Texto que se añade antes del enlace
    prefixInsideLink:
      name: Prefijo dentro del enlace
      description: Texto que se añade al inicio del texto del enlace
    suffixInsideLink:
      name: Sufijo dentro del enlace
      description: Texto que se añade al final del texto del enlace
    suffixOutsideLink:
      name: Sufijo fuera del enlace
      description: Texto que se añade después del enlace
    presets:
      name: Estilos predefinidos
      description: Elige un estilo predefinido para el enlace
    fontStyle:
      name: Estilo de fuente
      description: Elige el estilo de fuente para el texto del enlace
      normal: Normal
      italic: Cursiva
      bold: Negrita
    preview:
      name: Vista previa del enlace
  bibleQuote:
    name: Formato de Citas Bíblicas
    description: Configurar cómo se formatean las citas bíblicas cuando se insertan
    presets:
      name: Plantillas predefinidas
      short: Enlace + cita
      plain: Enlace en cita
      foldable: Callout plegable
      expanded: Callout expandido
    template:
      name: Plantilla de cita
      description: 'Personaliza el formato de cita usando variables: {bibleRef}, {bibleRefLinked}, {quote}'
    preview:
      name: Vista Previa de Cita Bíblica
  offlineBible:
    name: Offline Bible
    description: Import a Bible EPUB once and use local chapter data for offline citation lookup.
    enabled:
      name: Enable offline Bible
      description: Allow the citation pipeline to use imported local Bible data.
    preferOffline:
      name: Prefer offline quotes
      description: Check the imported offline Bible before attempting online retrieval.
    allowOnlineFallback:
      name: Allow online fallback
      description: If offline data is missing, allow the plugin to try the online citation provider.
    installedList:
      name: Biblias sin conexión instaladas
      description: Se puede instalar una Biblia sin conexión por idioma. El idioma se detecta a partir de los metadatos del EPUB.
      empty: Aún no hay Biblias sin conexión instaladas.
      entry: '{{sourceFileName}} — {{chapterCount}} capítulos, importada el {{importedAt}}'
    actions:
      name: Acciones de la Biblia sin conexión
      description: Importe un EPUB para añadir un nuevo idioma. Para reemplazar uno existente, elimínelo primero.
      import: Importar EPUB de la Biblia
      remove: Eliminar
      openFolder: Abrir carpeta de la Biblia sin conexión
commands:
  linkUnlinkedBibleReferences: Enlazar referencias bíblicas no enlazadas
  convertToJWLibraryLinks: Convertir los enlaces de la selección en enlaces de la Biblioteca JW
  insertBibleQuotes: Insertar citas bíblicas para enlaces de la Biblioteca JW
  insertBibleQuoteAtCursor: Insertar cita bíblica en el cursor
convertSuggester:
  emptyStateText: Selecciona un tipo de conversión
  options:
    all: Todo
    bible: Referencias bíblicas
    publication: Publicaciones
contextMenu:
  insertBibleQuote: Insertar cita bíblica
notices:
  convertedBibleReferences: '{{count}} referencias bíblicas convertidas'
  pleaseSelectText: Por favor selecciona texto para convertir
  noBibleReferencesFound: No se encontraron referencias bíblicas
  bibleQuotesInserted: Citas bíblicas insertadas exitosamente
  bibleQuotesInsertedSelection: Citas bíblicas insertadas para la selección
  bibleQuoteInsertedAtCursor: Cita bíblica insertada en el cursor
  noBibleLinksFound: No se encontraron enlaces de la Biblioteca JW
  noBibleLinkAtCursor: No se encontró enlace de Biblioteca JW en el cursor
  bibleQuoteAlreadyExists: La cita bíblica ya existe
  errorInsertingQuotes: Error al insertar citas bíblicas
  bibleQuoteFetchFailed: No se pudo obtener el texto bíblico — inténtelo de nuevo
  offlineBibleImported: Biblia sin conexión importada para {{language}}
  offlineBibleRemoved: Biblia sin conexión eliminada para {{language}}
  offlineBibleAlreadyInstalled: Ya hay una Biblia sin conexión instalada para {{language}}. Elimínela primero para volver a importarla.
  offlineBibleImportFailed: No se pudo importar el EPUB de la Biblia sin conexión
  offlineBibleOpenFolderFailed: No se pudo abrir la carpeta de la Biblia sin conexión
suggestions:
  createLink: 'Crear enlace: {{text}}'
  createLinks: 'Crear enlaces: {{text}}'
  createAndOpen: 'Crear enlace y abrir: {{text}}'
  createMultipleAndOpenFirst: 'Crear enlaces y abrir el primero: {{text}}'
  typing: 'Introduce referencia bíblica: {{text}}'
  typingEmpty: Introduce referencia bíblica
errors:
  invalidVerseNumber: Número de versículo no válido
  versesAscendingOrder: Los versículos deben estar en orden ascendente
  chaptersAscendingOrder: Los capítulos deben estar en orden ascendente
  invalidVerseFormat: Formato de versículo no válido
  invalidReferenceFormat: Formato de referencia no válido
  unsupportedLanguage: Idioma no compatible
  offlineBibleNotInstalled: No hay una Biblia sin conexión instalada para {{language}}. Importe un EPUB de la Biblia en los ajustes para habilitar las citas sin conexión.
  offlineBibleVerseMissing: Los versículos solicitados faltan o no se pueden leer en la Biblia sin conexión para {{language}}.
  offlineBibleLookupFailed: La búsqueda en la Biblia sin conexión falló.
  onlineFallbackDisabled: La alternativa en línea está desactivada.
