settings:
  language:
    name: Sprache
    description: Wähle die Sprache für die Bibelverweise
  openAutomatically:
    name: Links automatisch öffnen
    description: Verschiebt den Befehl "Link und öffnen" an den Anfang der Liste
  updatedLinkStructure:
    name: Linktext beibehalten
    description: Wenn aktiviert, wird der aktuelle Linktext beim Umwandeln von Bibeltexten beibehalten
    keepCurrentStructure: Aktuellen Linktext beibehalten
    usePluginSettings: Plugin-Einstellungen verwenden
  noLanguageParameter:
    name: Links sprachunabhängig erstellen
    description: Wenn aktiviert, werden am Ende eines Links keine Sprachparameter hinzugefügt. Links werden in der jeweiligen Sprache der JW Library geöffnet
  reconvertExistingLinks:
    name: Bestehende Links erneut konvertieren
    description: Wenn aktiviert, werden bereits konvertierte jwlibrary:// Links gemäß den aktuellen Formatierungseinstellungen erneut konvertiert. Dies ermöglicht es, alle Links an die neuesten Einstellungen anzupassen.
  bookLength:
    name: Linktext-Länge
    description: Wähle die Länge des Linktextes
    short: Kurz
    medium: Mittel
    long: Lang
  linkStyling:
    name: Link-Styling
    description: Wähle Zeichen oder Emojis, die nach oder innerhalb des Links eingefügt werden; wähle Schriftstil
    reset: 'Zurücksetzen auf Standard: "{{default}}"'
    prefixOutsideLink:
      name: Präfix außerhalb des Links
      description: Text, der vor dem Link hinzugefügt wird
    prefixInsideLink:
      name: Präfix innerhalb des Links
      description: Text, der am Anfang des Linktextes hinzugefügt wird
    suffixInsideLink:
      name: Suffix innerhalb des Links
      description: Text, der am Ende des Linktextes hinzugefügt wird
    suffixOutsideLink:
      name: Suffix außerhalb des Links
      description: Text, der nach dem Link hinzugefügt wird
    presets:
      name: Stilvorlagen
      description: Wähle eine Stilvorlage für den Link
    fontStyle:
      name: Schriftstil
      description: Wähle den Schriftstil für den Linktext
      normal: Normal
      italic: Kursiv
      bold: Fett
    preview:
      name: Link Vorschau
  bibleQuote:
    name: Bibelzitat-Formatierung
    description: Konfiguriere die Formatierung von eingefügten Bibelzitaten
    presets:
      name: Vorlagenvoreinstellungen
      short: Link + Zitat
      plain: Link in Zitat
      foldable: Einklappbarer Callout
      expanded: Ausgeklappter Callout
    template:
      name: Zitatvorlage
      description: 'Passe das Zitatformat mit Variablen an: {bibleRef}, {bibleRefLinked}, {quote}'
    preview:
      name: Bibelzitat-Vorschau
  offlineBible:
    name: Offline-Bibel
    description: Eine Bibel-EPUB einmal importieren und lokale Kapiteldaten für die Offline-Zitatsuche verwenden.
    enabled:
      name: Offline-Bibel aktivieren
      description: Ermöglicht der Zitatfunktion, importierte lokale Bibeldaten zu verwenden.
    preferOffline:
      name: Offline-Zitate bevorzugen
      description: Zuerst die importierte Offline-Bibel prüfen, bevor eine Online-Abfrage versucht wird.
    allowOnlineFallback:
      name: Online-Rückfall erlauben
      description: Falls Offline-Daten fehlen, kann das Plugin den Online-Zitatanbieter verwenden.
    status:
      name: Installierte Sprachversionen
      notInstalled: Für {{language}} ist keine Offline-Bibel installiert.
      installed: Offline-Bibel für {{language}} installiert aus {{sourceFileName}} am {{importedAt}} mit {{chapterCount}} Kapiteln.
    actions:
      name: Offline-Bibel-Aktionen
      description: Offline-Bibelkorpus für die ausgewählte Sprache importieren, ersetzen, entfernen oder anzeigen.
      import: Bibel-EPUB importieren
      reimport: Bibel-EPUB erneut importieren
      remove: Offline-Bibel entfernen
      openFolder: Offline-Bibel-Ordner öffnen
