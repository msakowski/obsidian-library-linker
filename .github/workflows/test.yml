name: Test

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: install dependencies
        run: pnpm install --frozen-lockfile

      - name: lint
        run: pnpm test:lint

      - name: unit-test
        run: pnpm test:vitest

      - name: typecheck
        run: pnpm test:types

      - name: build
        run: pnpm build
