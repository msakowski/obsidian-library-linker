name: Bug Report
description: Report something that isn't working as expected
title: "fix: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below to help us reproduce and fix it.

  - type: input
    id: plugin-version
    attributes:
      label: Plugin Version
      placeholder: e.g. 0.12.1
    validations:
      required: true

  - type: dropdown
    id: operating-system
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
        - iOS
        - Android
    validations:
      required: true

  - type: textarea
    id: current-behaviour
    attributes:
      label: Current Behaviour
      description: What is happening?
      placeholder: When I type... the plugin...
    validations:
      required: true

  - type: textarea
    id: expected-behaviour
    attributes:
      label: Expected Behaviour
      description: What should happen instead?
      placeholder: The plugin should...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Open a note
        2. Type `/b Matt 24:14`
        3. ...
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or error messages from the developer console (Ctrl+Shift+I).
    validations:
      required: false
